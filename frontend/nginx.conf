server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # TD-41: security headers at server level.
    # Nginx inherits add_header from parent ONLY when a child location has no
    # add_header of its own. Caching is handled via the `expires` directive
    # (not add_header), so all three locations below inherit these headers.
    # HSTS omitted — TLS not active (deferred to F5).
    # CSP: googleapis.com + gstatic.com required for Google Fonts loaded in
    # index.html and index.css @import (Syne, DM Sans, Barlow, Bebas Neue, JetBrains Mono).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # DEF-01 fix: backend served on port 8000 is a different origin from port 80;
    # connect-src must include it explicitly. For LAN deployments with a different
    # VITE_API_URL, update this directive alongside CORS_ORIGINS in .env.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:8000;" always;

    # SPA fallback: todas las rutas no encontradas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash en el nombre (generados por Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
    }

    # Sin cache para index.html (siempre fresco)
    location = /index.html {
        expires -1;
    }
}
