name: rhinopower

services:

  backend:
    image: rhinopower/backend:1.0
    build:
      context: ./backend
    # SEC-005/R3: bind parametrizado. Default seguro = loopback (solo la propia
    # PC). Para un gimnasio multi-dispositivo en LAN, definir BIND_ADDR en .env
    # (IP LAN o 0.0.0.0) junto con VITE_API_URL. Sin auth (F2), exponer en LAN
    # es un riesgo residual documentado.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:8000:8000"
    env_file: .env
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: rhinopower/frontend:1.0
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    # SEC-005/R3: mismo bind parametrizado que el backend (default loopback).
    ports:
      - "${BIND_ADDR:-127.0.0.1}:80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    image: rhinopower/backend:1.0
    build:
      context: ./backend
    command: ["python", "-m", "scheduler.main"]
    env_file: .env
    volumes:
      - db-data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
    name: rhinopower_db-data
